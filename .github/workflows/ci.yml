name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scorer/requirements-dev.txt
      - name: Install scorer deps
        run: pip install -r scorer/requirements-dev.txt
      - name: Run tests
        working-directory: scorer
        run: python -m pytest -q

  compose-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate docker-compose.yml
        run: docker compose config --quiet && echo "compose OK"
